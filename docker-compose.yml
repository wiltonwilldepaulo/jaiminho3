services:
  # Servidor web Nginx que recebe as requisições HTTP
  nginx:
    # Imagem oficial estável do Nginx sobre Alpine 3.23
    image: nginx:1.30-alpine3.23

    # Nome fixo do container facilita identificação e debug
    container_name: app_nginx

    # Sobe novamente caso o processo morra inesperadamente
    restart: unless-stopped

    # Expõe a porta 80 do host na 80 do container
    ports:
      - "80:80"

    # Arquivos montados do host dentro do container
    volumes:
      # Configuração do site em modo somente leitura
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Diretório público da aplicação em modo somente leitura
      - ./public:/var/www/public:ro

    # Diretórios em RAM para evitar I/O de disco
    tmpfs:
      # Pasta temporária geral em RAM
      - /tmp:size=512m,mode=1777
      # Diretório de cache do Nginx em RAM com uid do usuário nginx
      - /var/cache/nginx:size=1024m,uid=101,gid=101

    # Limites de uso de recursos do container
    deploy:
      resources:
        limits:
          # Memória máxima usada pelo container
          memory: 512M
          # Fração máxima de CPU do host
          cpus: "0.50"
        reservations:
          # Memória mínima garantida pelo Docker
          memory: 256M

    # Limites de file descriptor do processo
    ulimits:
      nofile:
        # Limite flexível padrão
        soft: 65536
        # Limite rígido máximo
        hard: 65536

    # Configuração de captura e rotação de logs
    logging:
      # Driver json-file padrão do Docker
      driver: json-file
      options:
        # Tamanho máximo de cada arquivo de log
        max-size: "256m"
        # Quantidade máxima de arquivos de log rotacionados
        max-file: "3"

    # Verificação periódica de que o servidor responde
    healthcheck:
      # Faz HEAD na raiz e considera saudável se responder
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/" ]
      # Intervalo entre verificações
      interval: 30s
      # Tempo máximo aguardando resposta
      timeout: 5s
      # Falhas consecutivas para marcar como unhealthy
      retries: 3
      # Período de carência após iniciar o container
      start_period: 10s

    # Garante que o PHP suba antes do Nginx
    depends_on:
      - php

    # Liga o container à rede interna do projeto
    networks:
      - app_network

  # Container do PHP-FPM que executa a aplicação Slim
  php:
    # Diretório padrão de trabalho dentro do container
    working_dir: /var/www

    # Build a partir do Dockerfile do projeto
    build:
      # Contexto de build na raiz do projeto
      context: .
      # Caminho do Dockerfile
      dockerfile: docker/php/Dockerfile

    # Nome fixo do container
    container_name: app_php

    # Sobe novamente caso o processo morra
    restart: unless-stopped

    # Permite ao container conversar com o host para o Xdebug
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Volumes montados no container
    volumes:
      # Código-fonte do projeto refletido em tempo real para desenvolvimento
      - ./:/var/www/
      # Cache persistente do Composer entre runs do container
      - composer_cache:/root/.composer/cache

    # Comando executado na subida do container
    command: >+
      sh -c "composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader &&
             exec php-fpm"

    # Variáveis de ambiente disponíveis dentro do container
    environment:
      # Fuso horário do container
      TZ: ${TZ}
      # Ambiente da aplicação como development ou production
      APP_ENV: ${APP_ENV:-development}
      # Liga ou desliga o display de erros do PHP
      APP_DEBUG: ${APP_DEBUG:-true}
      # Modo do Xdebug controlado por variável própria com default desligado
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      # Controla a revalidação de timestamps do OPcache — 1 dev e 0 produção
      OPCACHE_VALIDATE_TIMESTAMPS: ${OPCACHE_VALIDATE_TIMESTAMPS:-1}

      # Tempo máximo de execução do Composer em segundos
      COMPOSER_PROCESS_TIMEOUT: 1800
      # Remove limite de memória do Composer
      COMPOSER_MEMORY_LIMIT: -1
      # Permite executar o Composer como root dentro do container
      COMPOSER_ALLOW_SUPERUSER: 1
      # Define o diretório home do Composer
      COMPOSER_HOME: /root/.composer
      # Define o diretório de cache do Composer alinhado ao volume nomeado
      COMPOSER_CACHE_DIR: /root/.composer/cache
      # Desliga prompts interativos do Composer
      COMPOSER_NO_INTERACTION: 1

      # String de conexão usada pela aplicação
      DB_CONNECTION: ${DB_CONNECTION}
      # Host do banco de dados
      DB_HOST: ${DB_HOST}
      # Porta do banco com fallback 5432
      DB_PORT: ${DB_PORT:-5432}
      # Nome do banco de dados
      DB_NAME: ${DB_NAME}
      # Usuário do banco
      DB_USER: ${DB_USER}
      # Senha do banco
      DB_PASSWORD: ${DB_PASSWORD}

      # Host do Redis
      REDIS_HOST: ${REDIS_HOST}
      # Porta do Redis com fallback 6379
      REDIS_PORT: ${REDIS_PORT:-6379}
      # Senha do Redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Database lógico do Redis usado pela aplicação
      REDIS_DATABASE: ${REDIS_DATABASE:-1}
      # Prefixo das chaves de sessão no Redis
      REDIS_PREFIX: ${REDIS_PREFIX:-SESS:}
      # Timeout de conexão em segundos
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-2.5}
      # Timeout de leitura em segundos
      REDIS_READ_TIMEOUT: ${REDIS_READ_TIMEOUT:-2.5}
      # Liga conexões persistentes do PHP com o Redis
      REDIS_PERSISTENT: ${REDIS_PERSISTENT:-1}

      # Modo dinâmico do gerenciador de processos do PHP-FPM
      PHP_FPM_PM: dynamic
      # Número máximo de workers PHP-FPM
      PHP_FPM_PM_MAX_CHILDREN: 10
      # Quantidade de workers iniciais
      PHP_FPM_PM_START_SERVERS: 2
      # Mínimo de workers ociosos
      PHP_FPM_PM_MIN_SPARE_SERVERS: 1
      # Máximo de workers ociosos
      PHP_FPM_PM_MAX_SPARE_SERVERS: 3
      # Requests por worker antes de reciclar
      PHP_FPM_PM_MAX_REQUESTS: 500

    # Diretórios em RAM para acelerar I/O
    tmpfs:
      # Pasta temporária com sessões e uploads em RAM
      - /tmp:size=1g,mode=1777

    # Limites de recursos do container
    deploy:
      resources:
        limits:
          # Memória máxima usada pelo container
          memory: 1024M
          # Fração máxima de CPU do host
          cpus: "2.00"
        reservations:
          # Memória mínima garantida pelo Docker
          memory: 512M

    # Limites de file descriptor por worker
    ulimits:
      nofile:
        # Limite flexível padrão
        soft: 65536
        # Limite rígido máximo
        hard: 65536

    # Logs do container com rotação
    logging:
      # Driver padrão json-file
      driver: json-file
      options:
        # Tamanho máximo de cada arquivo de log
        max-size: "10m"
        # Quantidade máxima de arquivos rotacionados
        max-file: "3"

    # Healthcheck na porta TCP do PHP-FPM
    healthcheck:
      # Testa se a porta 9000 aceita conexão
      test: [ "CMD-SHELL", "nc -z localhost 9000 || exit 1" ]
      # Intervalo entre verificações
      interval: 30s
      # Tempo máximo aguardando resposta
      timeout: 5s
      # Falhas consecutivas para marcar como unhealthy
      retries: 3
      # Período de carência estendido para o composer install inicial
      start_period: 90s

    # Garante que o PostgreSQL esteja saudável antes do PHP-FPM iniciar
    depends_on:
      postgres:
        # Aguarda o healthcheck do PostgreSQL passar
        condition: service_healthy

    # Liga o container à rede interna do projeto
    networks:
      - app_network

  # Container do Redis usado para sessões e cache
  redis:
    # Imagem oficial do Redis sobre Alpine
    image: redis:8.6-alpine3.23

    # Nome fixo do container
    container_name: app_redis

    # Sobe novamente caso o processo morra
    restart: unless-stopped

    # Expõe apenas localhost do host para o desenvolvedor
    ports:
      - "127.0.0.1:6379:6379"

    # Variáveis de ambiente do container
    environment:
      # Fuso horário do container
      TZ: ${TZ}
      # Senha aplicada na configuração do Redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    # Comando que sobe o Redis com senha
    command: >
      sh -c "exec redis-server --requirepass \"$${REDIS_PASSWORD}\""

    # Healthcheck do Redis usando ping autenticado
    healthcheck:
      # Confirma que o servidor responde PONG
      test: [ "CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 -a \"$${REDIS_PASSWORD}\" ping | grep PONG || exit 1" ]
      # Intervalo entre verificações
      interval: 5s
      # Tempo máximo aguardando resposta
      timeout: 3s
      # Tentativas antes de falhar
      retries: 20
      # Período de carência após subir
      start_period: 5s

    # Volume de persistência do Redis no host
    volumes:
      - ./docker/redis:/data

    # Liga o container à rede interna do projeto
    networks:
      - app_network

  # Container do PostgreSQL como banco de dados
  postgres:
    # Imagem oficial do PostgreSQL sobre Alpine
    image: postgres:18.3-alpine3.23

    # Nome fixo do container
    container_name: app_postgres

    # Sobe novamente caso o processo morra
    restart: unless-stopped

    # Parâmetros de tuning passados diretamente ao processo postgres
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=384MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=16MB
        -c max_connections=50
        -c checkpoint_completion_target=0.9
        -c synchronous_commit=off
        -c log_min_duration_statement=1000
        -c log_timezone=${TZ}
        -c temp_file_limit=256MB

    # Variáveis de ambiente do container
    environment:
      # Nome do banco criado na inicialização
      POSTGRES_DB: ${DB_NAME}
      # Usuário criado na inicialização
      POSTGRES_USER: ${DB_USER}
      # Senha do usuário
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Fuso horário do container
      TZ: ${TZ}
      # Diretório explícito de dados do PostgreSQL
      PGDATA: /var/lib/postgresql/data/pgdata

    # Volumes do container
    volumes:
      # Persiste dados do banco no host
      - ./docker/postgres/storage:/var/lib/postgresql/data/pgdata
      # Script SQL executado na primeira inicialização
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    # Diretório em RAM para operações temporárias
    tmpfs:
      # Pasta temporária do PostgreSQL em RAM
      - /tmp:size=64m,mode=1777

    # Limites de recursos do container
    deploy:
      resources:
        limits:
          # Memória máxima do container
          memory: 512M
          # Fração máxima de CPU do host
          cpus: "1.00"
        reservations:
          # Memória mínima garantida pelo Docker
          memory: 256M

    # Limites de file descriptor do processo
    ulimits:
      nofile:
        # Limite flexível padrão
        soft: 65536
        # Limite rígido máximo
        hard: 65536

    # Logs do container com rotação
    logging:
      # Driver padrão json-file
      driver: json-file
      options:
        # Tamanho máximo de cada arquivo de log
        max-size: "10m"
        # Quantidade máxima de arquivos rotacionados
        max-file: "3"

    # Healthcheck usando o utilitário nativo do PostgreSQL
    healthcheck:
      # Confirma que o banco aceita conexões
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      # Intervalo entre verificações
      interval: 30s
      # Tempo máximo aguardando resposta
      timeout: 5s
      # Falhas consecutivas para marcar como unhealthy
      retries: 3
      # Período de carência após subir
      start_period: 30s

    # Expõe a porta do banco para ferramentas cliente no host
    ports:
      - "${DB_PORT}:${DB_PORT}"

    # Liga o container à rede interna do projeto
    networks:
      - app_network

# Volumes nomeados do projeto
volumes:
  # Cache do Composer persistente entre runs do container
  composer_cache:
    # Driver padrão de volume local
    driver: local

# Redes do projeto
networks:
  # Rede bridge interna que conecta todos os serviços
  app_network:
    # Driver bridge padrão do Docker
    driver: bridge
