# Pool de conexões persistentes com o PHP-FPM reusadas entre requests
upstream php_fpm {
    # Endereço do container PHP-FPM resolvido pelo DNS interno do Docker
    server php:9000;
    # Mantém até 32 conexões TCP abertas e ociosas com o PHP-FPM
    keepalive 32;
    # Tempo em segundos que uma conexão ociosa pode ficar viva no pool
    keepalive_timeout 60s;
    # Número máximo de requests por conexão antes de reciclar
    keepalive_requests 1000;
}

# Cache em RAM de metadados de arquivos abertos no disco
open_file_cache max=4000 inactive=30s;

# Tempo em segundos que uma entrada válida fica no cache de arquivos
open_file_cache_valid 60s;

# Mínimo de acessos para que um arquivo seja mantido no cache
open_file_cache_min_uses 2;

# Cacheia também resultados negativos como 404 e permission denied
open_file_cache_errors on;

# Aumenta a tabela de tipos MIME para suportar todos os tipos modernos
types_hash_max_size 4096;

# Liga a compressão gzip das respostas para reduzir bytes transferidos
gzip on;

# Comprime também respostas que vêm de proxies internos como o PHP-FPM
gzip_proxied any;

# Inclui o cabeçalho Vary para o cliente saber que a compressão varia por Accept-Encoding
gzip_vary on;

# Tamanho mínimo da resposta em bytes para aplicar compressão
gzip_min_length 1024;

# Nível de compressão entre 1 e 9 onde 5 é o melhor custo benefício de CPU e tamanho
gzip_comp_level 5;

# Tipos MIME que serão comprimidos pelo gzip
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/rss+xml
    application/wasm
    image/svg+xml
    font/ttf
    font/otf;

# Desativa compressão para navegadores antigos sem suporte real
gzip_disable "msie6";

# Mapeia X-Forwarded-Proto recebido do Traefik em produção para a variável usada no FastCGI
map $http_x_forwarded_proto $https_forwarded {
    # Quando o Traefik diz que veio via HTTPS preenche on para o PHP enxergar como seguro
    https on;
    # Em qualquer outro caso deixa vazio o que o PHP interpreta como off
    default "";
}

server {
    # Porta HTTP padrão do servidor
    listen 80 default_server;

    # Aceita IPv6 também na porta 80
    listen [::]:80 default_server;

    # Nome do host servido por este bloco
    server_name localhost;

    # Diretório raiz dos arquivos públicos da aplicação Slim
    root /var/www/public;

    # Arquivo padrão procurado quando o path aponta para diretório
    index index.php;

    # Define o charset padrão das respostas como UTF-8
    charset utf-8;

    # Tamanho máximo do corpo do request alinhado com post_max_size do php.ini
    client_max_body_size 512M;

    # Tamanho do buffer inicial para o corpo do request
    client_body_buffer_size 128k;

    # Tempo em segundos para o cliente enviar o corpo do request
    client_body_timeout 60s;

    # Tempo em segundos para o cliente enviar os cabeçalhos do request
    client_header_timeout 30s;

    # Tempo em segundos que uma conexão keep-alive com o cliente fica aberta
    keepalive_timeout 65s;

    # Caminho do log de acessos do site
    access_log /var/log/nginx/access.log;

    # Caminho do log de erros do site
    error_log /var/log/nginx/error.log warn;

    # Bloqueia acesso a arquivos ocultos como .git .env e .htaccess
    location ~ /\. {
        # Retorna 403 sem nem tentar abrir o arquivo
        deny all;
        # Não loga essas tentativas para não poluir o access log
        access_log off;
        # Não loga tentativas de acessar arquivos inexistentes
        log_not_found off;
    }

    # Favicon retorna 204 quando não existir e nunca invoca o PHP
    location = /favicon.ico {
        # Não loga acessos ao favicon
        access_log off;
        # Não loga 404 do favicon
        log_not_found off;
        # Cache local de 7 dias quando o favicon existir
        expires 7d;
        # Se o arquivo não existir retorna 204 No Content
        try_files $uri =204;
    }

    # robots.txt servido direto do disco sem invocar o PHP
    location = /robots.txt {
        # Não loga acessos ao robots.txt
        access_log off;
        # Não loga quando o arquivo não existir
        log_not_found off;
        # Se o arquivo não existir retorna 204 No Content
        try_files $uri =204;
    }

    # Assets gerados pelo Vite com hash no nome recebem cache imutável
    location ^~ /assets/ {
        # Cache local no browser de 1 ano para arquivos com hash
        expires 1y;
        # Header explícito de cache imutável para CDNs e browsers modernos
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Não loga requests de assets para reduzir I/O do disco
        access_log off;
        # Se o arquivo não existir retorna 404 sem chamar o PHP
        try_files $uri =404;
    }

    # Imagens e ícones soltos em /public recebem cache moderado
    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|avif|svg)$ {
        # Cache local no browser de 30 dias
        expires 30d;
        # Header de cache permite armazenamento por proxies intermediários
        add_header Cache-Control "public" always;
        # Não loga requests de imagens
        access_log off;
        # Se a imagem não existir retorna 404 sem chamar o PHP
        try_files $uri =404;
    }

    # Fontes web com cache longo
    location ~* \.(?:woff2|woff|ttf|otf|eot)$ {
        # Cache local no browser de 1 ano
        expires 1y;
        # Header explícito de cache imutável para fontes
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Permite que outros domínios usem as fontes via CORS
        add_header Access-Control-Allow-Origin "*" always;
        # Não loga requests de fontes
        access_log off;
        # Se a fonte não existir retorna 404 sem chamar o PHP
        try_files $uri =404;
    }

    # Front controller Slim recebe todas as requests não cobertas pelas regras acima
    location / {
        # Tenta arquivo estático e cai no index.php quando não existir
        try_files $uri /index.php?$query_string;
    }

    # Execução de arquivos PHP via FastCGI no PHP-FPM
    location ~ \.php$ {
        # Garante que o arquivo PHP requisitado existe antes de chamar o FPM
        try_files $uri =404;

        # Inclui parâmetros padrão FastCGI da imagem do Nginx
        include fastcgi_params;

        # Envia para o upstream com keepalive ativado
        fastcgi_pass php_fpm;

        # Arquivo padrão quando o path apontar para diretório
        fastcgi_index index.php;

        # Caminho absoluto do script PHP a ser executado
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Parte do path que vem depois do script
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Sinaliza ao PHP que a request veio via HTTPS quando o Traefik faz TLS na frente
        fastcgi_param HTTPS $https_forwarded;

        # Mantém a conexão TCP com o PHP-FPM aberta após a resposta
        fastcgi_keep_conn on;

        # Tamanho do primeiro buffer que recebe os cabeçalhos da resposta do PHP
        fastcgi_buffer_size 32k;

        # Número e tamanho dos buffers seguintes para o corpo da resposta
        fastcgi_buffers 32 32k;

        # Tamanho de buffers ocupados que podem ser enviados ao cliente em paralelo
        fastcgi_busy_buffers_size 64k;

        # Tamanho máximo de cada arquivo temporário em disco se buffers encherem
        fastcgi_temp_file_write_size 64k;

        # Mantém o buffering ativado para que o PHP-FPM libere o worker rapidamente
        fastcgi_buffering on;

        # Tempo máximo em segundos para conectar ao PHP-FPM
        fastcgi_connect_timeout 5s;

        # Tempo máximo em segundos enviando dados ao PHP-FPM
        fastcgi_send_timeout 60s;

        # Tempo máximo em segundos aguardando resposta do PHP-FPM
        fastcgi_read_timeout 60s;

        # Não intercepta erros do PHP para que o Slim renderize páginas de erro próprias
        fastcgi_intercept_errors off;

        # Esconde cabeçalhos sensíveis que o PHP pode adicionar
        fastcgi_hide_header X-Powered-By;
    }

    # Cabeçalho de segurança mínimo aplicado a todas as respostas
    add_header X-Content-Type-Options "nosniff" always;

    # Bloqueia uso da página em iframes de outros domínios para evitar clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Política mínima de referrer enviada para sites externos
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}