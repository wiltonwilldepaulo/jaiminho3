; ===========================================================================
; PHP Configuration - Ambiente de Desenvolvimento
; Aplicação: Slim Framework 4 + PostgreSQL
; Container: php:8.5.4-fpm-alpine3.23
; ===========================================================================

; ---------------------------------------------------------------------------
; Limites de recursos
; ---------------------------------------------------------------------------

; Memória máxima por processo PHP-FPM (256M é seguro para Slim Framework)
memory_limit=256M

; Tamanho máximo de upload de arquivo individual
upload_max_filesize=50M

; Tamanho máximo do corpo da requisição POST (deve ser >= upload_max_filesize)
post_max_size=55M

; Tempo máximo de execução de um script em segundos
max_execution_time=60

; Tempo máximo que o PHP aguarda para receber dados de entrada (POST/upload)
max_input_time=60

; ---------------------------------------------------------------------------
; Fuso horário
; ---------------------------------------------------------------------------

date.timezone=America/Porto_Velho

; ---------------------------------------------------------------------------
; Exibição de erros (desenvolvimento)
; Em produção altere display_errors para Off e error_reporting para E_ALL & ~E_DEPRECATED
; ---------------------------------------------------------------------------

display_errors=On
display_startup_errors=On
error_reporting=E_ALL
log_errors=On
error_log=/proc/self/fd/2

; ---------------------------------------------------------------------------
; OPcache - Cache de bytecode (melhora performance evitando recompilação)
; ---------------------------------------------------------------------------

opcache.enable=1

; Verifica timestamps dos arquivos para detectar alterações (essencial em dev)
opcache.validate_timestamps=1

; Intervalo em segundos para revalidar (0 = verifica a cada requisição, ideal para dev)
opcache.revalidate_freq=0

; Memória reservada para armazenar bytecode em cache (MB)
opcache.memory_consumption=256

; Número máximo de arquivos que o OPcache pode armazenar
opcache.max_accelerated_files=10000

; Memória para armazenamento de strings internalizadas (MB)
opcache.interned_strings_buffer=16

; ---------------------------------------------------------------------------
; PCOV - Cobertura de código para testes (alternativa leve ao Xdebug)
; Utilizado pelo Pest: composer test:cov / composer test:html
; ---------------------------------------------------------------------------

; Desativado por padrão para não impactar performance em requisições normais
; O Pest ativa automaticamente via linha de comando quando necessário
pcov.enabled=0

; Diretório que o PCOV deve analisar (apenas o código da aplicação)
pcov.directory=/var/www/app

; Exclui o diretório vendor da análise de cobertura
pcov.exclude="~vendor~"

; ---------------------------------------------------------------------------
; Xdebug - Debug com breakpoints via VSCode
; ---------------------------------------------------------------------------
; IMPORTANTE: xdebug.mode está definido como "off" aqui propositalmente.
; A ativação é controlada pela variável de ambiente XDEBUG_MODE no
; docker-compose.yml, que é condicionada ao valor de APP_DEBUG no .env.
; Quando APP_DEBUG=true  → XDEBUG_MODE=debug  (Xdebug ativo)
; Quando APP_DEBUG=false → XDEBUG_MODE=off    (Xdebug inativo)
; ---------------------------------------------------------------------------

[xdebug]
xdebug.mode=off
xdebug.start_with_request=yes
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.idekey=VSCODE
xdebug.log_level=0