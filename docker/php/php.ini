; ===========================================================================
; PHP Configuration — Slim Framework 4 + PostgreSQL (Desenvolvimento)
; Container: php:8.5.4-fpm-alpine3.23
; ===========================================================================

; ---------------------------------------------------------------------------
; Cache de resolução de caminhos reais — evita chamadas stat() repetidas ao SO
; ---------------------------------------------------------------------------

; Tamanho do cache de caminhos absolutos resolvidos pelo PHP (realpath)
realpath_cache_size=4096k

; Tempo em segundos que um caminho resolvido fica em cache antes de ser revalidado
realpath_cache_ttl=120

; ---------------------------------------------------------------------------
; Limites de recursos
; ---------------------------------------------------------------------------

; Memória máxima por processo PHP-FPM — 256M é suficiente para o Slim Framework
memory_limit=256M

output_buffering = 4096

; Tamanho máximo de um único arquivo enviado via upload
upload_max_filesize=50M

; Tamanho máximo do corpo completo da requisição POST — deve ser maior que upload_max_filesize
post_max_size=55M

; Tempo máximo em segundos que um script PHP pode executar antes de ser encerrado
max_execution_time=60

; Tempo máximo em segundos que o PHP aguarda receber dados de entrada (POST/upload)
max_input_time=60

; ---------------------------------------------------------------------------
; Fuso horário
; ---------------------------------------------------------------------------

; Fuso horário do PHP — afeta date(), strtotime(), DateTime e funções relacionadas
date.timezone=${TZ}

; ---------------------------------------------------------------------------
; Exibição de erros — configuração para desenvolvimento
; Em produção: display_errors=Off | error_reporting=E_ALL & ~E_DEPRECATED
; ---------------------------------------------------------------------------

; Exibe erros diretamente na resposta HTTP — útil em dev, nunca usar em produção
display_errors=On

; Exibe erros que ocorrem durante o boot do PHP, antes do script iniciar
display_startup_errors=On

; Reporta todos os tipos de erros, incluindo notices e warnings menos severos
error_reporting=E_ALL

; Ativa escrita dos erros em arquivo/saída — complementa o display_errors
log_errors=On

; Redireciona erros para o stderr do container — visível via "docker logs app_php"
error_log=/proc/self/fd/2

; ---------------------------------------------------------------------------
; Sessão — armazenamento em Redis
; Observação importante:
; - ${REDIS_PASSWORD} funciona se REDIS_PASSWORD estiver no ambiente do container
; - não basta existir no .env da aplicação; precisa ser exportada para o processo PHP
; ---------------------------------------------------------------------------

session.save_handler=redis
session.save_path="tcp://redis:6379?auth=${REDIS_PASSWORD}&database=1&prefix=SESS:&timeout=2.5&read_timeout=2.5&persistent=1"

; Tempo de vida da sessão em segundos
session.gc_maxlifetime=1440

; Endurecimento básico da sessão sem impactar o fluxo atual da aplicação
session.use_strict_mode=1
session.use_only_cookies=1
session.cookie_httponly=1

; Locking para evitar race condition de sessão em múltiplas requisições concorrentes
redis.session.locking_enabled=1
redis.session.lock_expire=60
redis.session.lock_wait_time=20000
redis.session.lock_retries=100

; ---------------------------------------------------------------------------
; OPcache — cache de bytecode compilado para evitar recompilação a cada request
; ---------------------------------------------------------------------------

; Ativa o OPcache — maior ganho de performance disponível no PHP sem alterar código
opcache.enable=1

; Verifica se arquivos PHP foram modificados em disco — essencial para refletir alterações em dev
opcache.validate_timestamps=1

; 0 = revalida a cada requisição — garante que qualquer save no VS Code seja imediatamente visível
opcache.revalidate_freq=0

; Memória reservada para armazenar o bytecode compilado de todos os arquivos PHP em cache
opcache.memory_consumption=256

; Máximo de arquivos PHP mantidos em cache — cobre vendor inteiro + código da aplicação
opcache.max_accelerated_files=20000

; Memória para strings compartilhadas entre processos — reduz duplicação de dados na RAM
opcache.interned_strings_buffer=32

; ---------------------------------------------------------------------------
; OPcache JIT — compilação Just-In-Time (PHP 8.0+), acelera código CPU-intensivo
; ---------------------------------------------------------------------------

; Modo tracing (1255): JIT mais agressivo, rastreia loops e funções quentes para compilar
opcache.jit=tracing

; Memória reservada para o código nativo gerado pelo JIT — separada da memória do OPcache
opcache.jit_buffer_size=128M

; ---------------------------------------------------------------------------
; PCOV — cobertura de código para testes (mais leve que Xdebug)
; Usado pelo Pest: "composer test:cov" e "composer test:html"
; ---------------------------------------------------------------------------

; Desativado por padrão — o Pest ativa automaticamente via CLI quando necessário
pcov.enabled=0

; Diretório analisado pelo PCOV — limita a cobertura ao código da aplicação
pcov.directory=/var/www/app

; Exclui o vendor da análise — dependências externas não devem entrar na cobertura
pcov.exclude="~vendor~"

; ---------------------------------------------------------------------------
; Xdebug — debug com breakpoints via VSCode
; xdebug.mode está "off" aqui intencionalmente — ativado via XDEBUG_MODE no docker-compose
; APP_DEBUG=true → XDEBUG_MODE=debug (ativo) | APP_DEBUG=false → permanece "off"
; ---------------------------------------------------------------------------

[xdebug]
; Modo desativado aqui — sobrescrito pela variável de ambiente XDEBUG_MODE do container
xdebug.mode=off

; Inicia debug automaticamente em toda requisição quando o modo debug está ativo
xdebug.start_with_request=yes

; Endereço do cliente de debug — host.docker.internal aponta para o VS Code no host Windows
xdebug.client_host=host.docker.internal

; Porta padrão do protocolo DAP usada pelo Xdebug para falar com o VS Code
xdebug.client_port=9003

; Chave de identificação da sessão de debug — deve coincidir com a configuração do VS Code
xdebug.idekey=VSCODE

; Desativa logs internos do Xdebug — evita ruído desnecessário nos logs do container
xdebug.log_level=0