{% extends 'layouts/main.html' %}

{% block breadcrumbs %}
<ol class="breadcrumb float-sm-end">
    <li class="breadcrumb-item"><a href="/">Início</a></li>
    <li class="breadcrumb-item"><a href="/cliente/lista">Lista de clientes</a></li>
    <li class="breadcrumb-item active" aria-current="page">Detalhes do cliente</li>
</ol>
{% endblock %}

{% block main %}
<form id="form">
    <input type="hidden" id="action" name="action" value="{{action}}">
    <input type="hidden" id="id" name="id" value="{{id}}">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <a href="/cliente/lista" class="btn btn-warning">
                        <i class="fa-solid fa-chevron-left"></i>
                        Voltar
                    </a>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input autofocus type="text" class="form-control" id="numeroDocumento"
                                    name="numeroDocumento" placeholder="Digite o CPF ou CNPJ!"
                                    value="{{customer.cpf_cnpj}}" required>
                                <label for="numeroDocumento">Digite o CPF ou CNPJ!</label>
                            </div>
                        </div>
                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="nomeExibicao" name="nomeExibicao"
                                    placeholder="Digite o nome ou nome fantasia!" value="{{customer.nome_fantasia}}"
                                    required>
                                <label for="nomeExibicao">Digite o nome ou nome
                                    fantasia!</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="nomeLegal" name="nomeLegal"
                                    placeholder="Digite o sobre nome ou razão social!"
                                    value="{{customer.sobrenome_razao}}" required>
                                <label for="nomeLegal">Digite o sobre nome ou razão
                                    social!</label>
                            </div>
                        </div>
                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="registroSecundario"
                                    name="registroSecundario" placeholder="Digite o rg ou ie!"
                                    value="{{customer.inscricao_estadual}}" required>
                                <label for="registroSecundario">Digite o rg ou ie!</label>
                            </div>
                        </div>
                        <div class="col-lg-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="dataRegistro" name="dataRegistro"
                                    placeholder="Informe o nascimento ou fundação!"
                                    value="{{customer.nascimento_fundacao | slice(0,2) }}/{{ customer.nascimento_fundacao | slice(2,2) }}/{{ customer.nascimento_fundacao | slice(4,4) }}"
                                    required>
                                <label for="dataRegistro">Informe o nascimento ou
                                    fundação!</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="icheck-primary d-inline">
                                <input class="form-check-label" type="checkbox" id="ativo" name="ativo" value="true" {%
                                    if customer.ativo==1 %} checked {% endif %}>
                                <label for="ativo">
                                    Ativo?
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button id="insert" type="button" class="btn btn-success">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}

{% block script %}
{{ vite('resources/js/pages/customer.js') }}
{% endblock %}
